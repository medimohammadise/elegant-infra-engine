name: Release Notes on Main Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes:
    if: ${{ github.event.pull_request.merged == true }}
    uses: medimohammadise/elegant-ci-cd-pipeline/.github/workflows/reusable-release-notes.yml@001-release-notes-workflow
